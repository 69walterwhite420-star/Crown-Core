# Crown Core — testnet profile.
#
# Per-chain keys, exactly these six (docs/core-spec.md §7):
#   id        — internal ChainId
#   source    — SOL RPC source variant; Custom is allowed in testnet only
#   consensus — provider aggregation strategy
#   splitter  — pinned splitter address, the root of recognition
#   usdc      — native USDC mint, for the transfer cross-check
#   factories — pinned escrow factories, the roots of recognition no.2
#               (zero or more); payers derived from them attribute to donor()
#
# Сторожевой интервал ингеста, секунды: гарантия полноты книги, когда никто
# не пинает (core-spec §5). Скорость даёт пустой будильник ingest_hint;
# на devnet сторож короткий, чтобы прогоны не ждали пинков.
ingest_watchdog = 60

[[chain]]
id        = "solana-devnet"
source    = "Default:Devnet"
consensus = "3-of-5"
splitter  = "DDSeyx684iU9agHbXExwS3NstLvQeLKZcJWcJFSh1VDA"
usdc      = "4zMMC9srt5Ri5X14GAgXhaHii3GnPAEERYPJgZJDncDU"
