name: ci

on: [push, pull_request]

jobs:
  # index depends on crown-derive by relative path (../../Crown-Factory/derive),
  # so the checkout has to reproduce the sibling layout that path expects.
  # A lone checkout cannot even load the manifest.
  core:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: Crown-Core
    steps:
      - uses: actions/checkout@v4
        with:
          path: Crown-Core
      - uses: actions/checkout@v4
        with:
          repository: bocchisan/Crown-Factory
          path: Crown-Factory
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt, clippy
          targets: wasm32-unknown-unknown
      - run: cargo fmt --all --check
      - run: cargo clippy --workspace --all-targets -- -D warnings
      - run: cargo test --workspace
      # The SOL RPC client tree compiles C (zstd-sys) for wasm32: point cc/ar
      # at a wasm-capable clang and llvm-ar, same as the e2e scripts do.
      - name: wasm toolchain for the C bits
        run: |
          sudo apt-get update -qq && sudo apt-get install -y -qq clang llvm
          echo "CC_wasm32_unknown_unknown=$GITHUB_WORKSPACE/Crown-Core/scripts/wasm-cc.sh" >> "$GITHUB_ENV"
          echo "AR_wasm32_unknown_unknown=$(command -v llvm-ar)" >> "$GITHUB_ENV"
      - run: cargo build --target wasm32-unknown-unknown --release -p crown-index
      - run: ./scripts/lint-boundaries.sh

  # The splitter's anchor workspace is excluded from the root one (its
  # solana tree must not leak into reduce/index), so the S2 DoD tests run
  # in their own job.
  splitter:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - run: cargo fmt --all --check
        working-directory: contracts/solana
      - run: cargo test
        working-directory: contracts/solana

